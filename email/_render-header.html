<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Header render</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; padding:0; }
  body { background:transparent; }
  .hero {
    width: 1120px;
    height: 360px;
    background-image: linear-gradient(155deg,#2563b0 0%,#1a4a7a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 0 36px;
    box-sizing: border-box;
  }
  .ico {
    width: 136px;
    height: 136px;
    margin: 0 0 18px;
    filter: drop-shadow(0 6px 14px rgba(0,80,20,0.30));
  }
  h1 {
    font-family: 'Boogaloo','Arial Rounded MT Bold',sans-serif;
    font-size: 72px;
    line-height: 1;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 0;
    text-shadow: 0 4px 14px rgba(0,0,0,0.32);
  }
  .sub {
    margin-top: 14px;
    font-family: 'Nunito','Arial',sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: rgba(255,255,255,0.86);
    letter-spacing: 6px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="hero">
  <svg class="ico" viewBox="0 0 310 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="l1" x1="5%" y1="5%" x2="95%" y2="95%">
        <stop offset="0%" stop-color="#ffd8a0"/>
        <stop offset="38%" stop-color="#f5a020"/>
        <stop offset="100%" stop-color="#c86c00"/>
      </linearGradient>
      <linearGradient id="l2" x1="95%" y1="5%" x2="5%" y2="95%">
        <stop offset="0%" stop-color="#ffe4b0"/>
        <stop offset="38%" stop-color="#ee9010"/>
        <stop offset="100%" stop-color="#b85e00"/>
      </linearGradient>
      <linearGradient id="ls" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#3ada6e"/>
        <stop offset="100%" stop-color="#14762e"/>
      </linearGradient>
      <linearGradient id="lb" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#aeffc8"/>
        <stop offset="100%" stop-color="#28c45c"/>
      </linearGradient>
    </defs>
    <g stroke-linecap="round" fill="none">
      <path d="M154 284 Q100 278 72 292"  stroke="#16763a" stroke-width="3.0"/>
      <path d="M156 284 Q210 278 238 292" stroke="#16763a" stroke-width="3.0"/>
      <path d="M154 283 Q112 270 92 278"  stroke="#1a8e44" stroke-width="3.2"/>
      <path d="M156 283 Q198 270 218 278" stroke="#1a8e44" stroke-width="3.2"/>
      <path d="M154 283 Q128 266 116 268" stroke="#1e9e4c" stroke-width="3.4"/>
      <path d="M156 283 Q182 266 194 268" stroke="#1e9e4c" stroke-width="3.4"/>
      <path d="M154 282 Q142 266 138 260" stroke="#20a650" stroke-width="3.5"/>
      <path d="M156 282 Q168 266 172 260" stroke="#20a650" stroke-width="3.5"/>
      <path d="M154 283 Q105 276 76 289"  stroke="#50de80" stroke-width="1.5" opacity="0.55"/>
      <path d="M156 283 Q205 276 234 289" stroke="#50de80" stroke-width="1.5" opacity="0.55"/>
      <path d="M154 282 Q130 268 118 270" stroke="#50de80" stroke-width="1.4" opacity="0.50"/>
      <path d="M156 282 Q180 268 192 270" stroke="#50de80" stroke-width="1.4" opacity="0.50"/>
    </g>
    <path d="M155 278 Q152 234 154 190 Q156 155 155 118" stroke="url(#ls)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M154 194 C136 174,82 152,62 108 C50 78,74 50,104 70 C126 85,144 146,154 194Z" fill="url(#l1)"/>
    <ellipse cx="96" cy="110" rx="22" ry="12" fill="rgba(255,255,255,0.26)" transform="rotate(-35 96 110)"/>
    <path d="M153 189 C130 166 88 128 68 100" stroke="rgba(255,255,255,0.42)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M156 162 C176 142,228 120,248 76 C260 46,236 18,206 38 C184 54,164 112,156 162Z" fill="url(#l2)"/>
    <ellipse cx="212" cy="80" rx="21" ry="11" fill="rgba(255,255,255,0.24)" transform="rotate(34 212 80)"/>
    <path d="M157 158 C178 134 210 94 228 68" stroke="rgba(255,255,255,0.38)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M155 118 C147 100 145 74 155 56 C165 74 163 100 155 118Z" fill="url(#lb)"/>
  </svg>
  <h1>My Math Roots</h1>
  <div class="sub">K-5 Review</div>
</div>
</body>
</html>
