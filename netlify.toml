[build]
  command   = "node build.js"
  publish   = "dist"
  functions = "netlify/functions"

# ── SPA catch-all — serve index.html for any path Netlify can't find a file for
# Real assets (sw.js, manifest.json, data/*.js, icons) are served directly;
# only truly missing paths (e.g. /dashboard/) fall through to the app.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline'
        https://accounts.google.com
        https://cdn.jsdelivr.net
        https://challenges.cloudflare.com;
      style-src 'self' 'unsafe-inline'
        https://accounts.google.com;
      font-src 'self' data:;
      connect-src 'self'
        https://omjegwtzirskgmgeojdn.supabase.co
        wss://omjegwtzirskgmgeojdn.supabase.co
        https://accounts.google.com
        https://cdn.jsdelivr.net;
      img-src 'self' data: blob:
        https://lh3.googleusercontent.com;
      frame-src
        https://accounts.google.com
        https://challenges.cloudflare.com;
      frame-ancestors 'none';
      form-action 'self';
      worker-src 'self';
      object-src 'none';
      base-uri 'self';
    """

# ── Service worker — must control the full origin ────────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cache-Control = "no-cache"

# ── PWA manifest ──────────────────────────────────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"

# ── Icons ─────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
