<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Analytics — My Math Roots Admin</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 1.5rem 2rem; background: #f0f2f5; color: #1a1a2e; }

    h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 0.2rem; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 2.5rem; }

    /* Sections */
    .section { margin-bottom: 2.5rem; }
    .section-title {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      color: #666; border-bottom: 2px solid #e0e0e0; padding-bottom: 0.5rem; margin: 0 0 1rem;
    }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
    .stat-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 1.1rem 1.25rem; }
    .stat-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #888; margin-bottom: 0.35rem; }
    .stat-value { font-size: 2rem; font-weight: 800; line-height: 1; margin-bottom: 0.3rem; color: #1a1a2e; }
    .stat-hint { font-size: 0.72rem; color: #aaa; line-height: 1.4; }

    /* Badges */
    .badge { display: inline-block; border-radius: 4px; padding: 0.15rem 0.55rem; font-size: 0.7rem; font-weight: 700; margin-top: 0.5rem; }
    .badge-ok   { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .badge-warn { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .badge-high { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    /* Tables */
    .tables-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    @media (max-width: 700px) { .tables-row { grid-template-columns: 1fr; } }
    .table-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; overflow: hidden; }
    .table-card-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #666; padding: 0.9rem 1rem 0.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { background: #f8f8f8; padding: 0.45rem 1rem; text-align: left; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.03em; color: #999; text-transform: uppercase; border-bottom: 1px solid #ececec; }
    td { padding: 0.55rem 1rem; border-bottom: 1px solid #f4f4f4; color: #333; }
    tr:last-child td { border-bottom: none; }

    /* Retention */
    .retention-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .retention-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 1.25rem; }
    .ret-pct { font-size: 2.4rem; font-weight: 800; line-height: 1; margin: 0.3rem 0; }
    .ret-pct.color-high { color: #059669; }
    .ret-pct.color-mid  { color: #d97706; }
    .ret-pct.color-low  { color: #dc2626; }
    .ret-pct.color-none { color: #d1d5db; }
    .ret-detail { font-size: 0.78rem; color: #555; margin-top: 0.3rem; }
    .ret-explain { font-size: 0.7rem; color: #aaa; margin-top: 0.3rem; line-height: 1.4; }

    /* Empty state */
    .empty { color: #ccc; font-size: 0.82rem; padding: 1.5rem 1rem; text-align: center; }

    /* Auth / loading states */
    #auth-gate { padding: 3rem 1rem; color: #b91c1c; font-weight: 700; font-size: 1rem; }
    #loading { padding: 3rem 1rem; color: #888; }

    /* Filters (Phase C.2) */
    .filters { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-top: 0.5rem; }
    .filter-col { display: flex; flex-direction: column; gap: 0.35rem; }
    .filter-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #888; }
    .filter-col select { font: inherit; font-size: 0.92rem; padding: 0.55rem 0.7rem; border: 1px solid #ddd; border-radius: 8px; background: #f8f8f8; color: #1a1a2e; cursor: pointer; }
    .filter-col select:hover  { border-color: #999; }
    .filter-col select:focus  { outline: none; border-color: #2563eb; background: #fff; }

    /* Funnel (Phase C.2) */
    .funnel-row { display: grid; grid-template-columns: 200px 1fr 240px; gap: 1rem; align-items: center; padding: 0.65rem 0.25rem; border-bottom: 1px solid #f4f4f4; }
    .funnel-row:last-child { border-bottom: none; }
    .funnel-stage { font-size: 0.85rem; font-weight: 600; color: #1a1a2e; }
    .funnel-bar { background: #f0f2f5; border-radius: 8px; height: 16px; overflow: hidden; }
    .funnel-fill { background: linear-gradient(90deg, #3b82f6, #6366f1); height: 100%; transition: width 0.25s ease; }
    .funnel-counts { font-size: 0.78rem; color: #555; display: flex; flex-direction: column; gap: 0.15rem; text-align: right; }
    .funnel-students { font-weight: 700; color: #1a1a2e; }
    .funnel-events   { color: #888; }
    .funnel-drop     { color: #dc2626; font-weight: 600; }
    @media (max-width: 700px) {
      .funnel-row { grid-template-columns: 1fr; gap: 0.25rem; padding: 0.85rem 0.25rem; }
      .funnel-counts { text-align: left; flex-direction: row; gap: 0.75rem; }
    }

    /* Refresh banner */
    .refresh-status { position: fixed; top: 1rem; right: 1rem; background: #1a1a2e; color: #fff; font-size: 0.82rem; font-weight: 600; padding: 0.55rem 0.95rem; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; }

    /* Error banner */
    .error-banner { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; padding: 1rem 1.25rem; border-radius: 10px; font-weight: 600; }

    /* Breakdown tabs (Phase C.3A — Average Scores) */
    .tab-bar { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.85rem; }
    .tab-btn { font: inherit; font-size: 0.85rem; padding: 0.45rem 0.95rem; border: 1px solid #ddd; border-radius: 999px; background: #fff; color: #555; cursor: pointer; transition: background 0.12s, border-color 0.12s, color 0.12s; }
    .tab-btn:hover  { border-color: #999; color: #1a1a2e; }
    .tab-btn.tab-active { background: #1a1a2e; border-color: #1a1a2e; color: #fff; font-weight: 700; }

    /* Section explanatory note */
    .section-note { font-size: 0.78rem; color: #888; margin: 0.75rem 0.25rem 0; line-height: 1.5; }

    /* Custom date range (Phase C.3A follow-up) */
    .custom-range-panel { margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed #e0e0e0; }
    .custom-range-grid { margin-top: 0 !important; }
    .filter-col input[type="date"] { font: inherit; font-size: 0.92rem; padding: 0.55rem 0.7rem; border: 1px solid #ddd; border-radius: 8px; background: #f8f8f8; color: #1a1a2e; }
    .filter-col input[type="date"]:focus { outline: none; border-color: #2563eb; background: #fff; }
    .custom-range-actions { justify-content: flex-end; }
    .apply-btn { font: inherit; font-size: 0.92rem; font-weight: 700; padding: 0.55rem 1.1rem; border: 1px solid #1a1a2e; background: #1a1a2e; color: #fff; border-radius: 8px; cursor: pointer; transition: background 0.12s, border-color 0.12s; }
    .apply-btn:hover  { background: #2d2d4a; border-color: #2d2d4a; }
    .apply-btn:active { transform: translateY(1px); }
    .custom-range-error { margin-top: 0.6rem; padding: 0.5rem 0.85rem; background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; border-radius: 8px; font-size: 0.82rem; font-weight: 600; }
  </style>
</head>
<body>
  <div id="auth-gate" style="display:none">Not authorized — admin role required.</div>
  <div id="loading">Verifying access…</div>
  <div id="dashboard" style="display:none">
    <h1>My Math Roots</h1>
    <p class="subtitle">Internal Analytics — Admin only · Last 30 days unless noted</p>
    <div id="dash-content"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/admin-analytics.js"></script>
</body>
</html>
