<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 512px; height: 512px; background: #f0f4f8; overflow: hidden; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- White glass background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1"/>
    </linearGradient>
    <!-- Highlight rim -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#d0d8e0;stop-opacity:0.4"/>
    </linearGradient>
    <!-- Sprout gradients -->
    <linearGradient id="hi-l1" x1="5%" y1="5%" x2="95%" y2="95%"><stop offset="0%" stop-color="#ffd8a0"/><stop offset="38%" stop-color="#f5a020"/><stop offset="100%" stop-color="#c86c00"/></linearGradient>
    <linearGradient id="hi-l2" x1="95%" y1="5%" x2="5%" y2="95%"><stop offset="0%" stop-color="#ffe4b0"/><stop offset="38%" stop-color="#ee9010"/><stop offset="100%" stop-color="#b85e00"/></linearGradient>
    <linearGradient id="hi-ls" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3ada6e"/><stop offset="100%" stop-color="#14762e"/></linearGradient>
    <linearGradient id="hi-lb" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#aeffc8"/><stop offset="100%" stop-color="#28c45c"/></linearGradient>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
    <!-- Symbol color - very subtle -->
    <style>
      .sym { font-family: "Arial Rounded MT Bold", "Nunito", Arial, sans-serif; font-weight: 900; fill: #8aabcc; opacity: 0.13; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Math symbols scattered - very transparent -->
  <g clip-path="url(#roundedClip)">
    <!-- Row 1 -->
    <text x="28"  y="78"  font-size="52" class="sym">+</text>
    <text x="118" y="62"  font-size="38" class="sym">7</text>
    <text x="198" y="80"  font-size="44" class="sym">×</text>
    <text x="284" y="58"  font-size="36" class="sym">12</text>
    <text x="378" y="78"  font-size="52" class="sym">÷</text>
    <text x="458" y="64"  font-size="40" class="sym">9</text>

    <!-- Row 2 -->
    <text x="18"  y="158" font-size="40" class="sym">3</text>
    <text x="88"  y="168" font-size="52" class="sym">=</text>
    <text x="182" y="152" font-size="38" class="sym">½</text>
    <text x="268" y="164" font-size="44" class="sym">+</text>
    <text x="358" y="160" font-size="52" class="sym">=</text>
    <text x="452" y="154" font-size="38" class="sym">5</text>

    <!-- Row 3 (sides + center) -->
    <text x="14"  y="280" font-size="46" class="sym">8</text>
    <text x="148" y="268" font-size="36" class="sym">÷</text>
    <text x="322" y="274" font-size="40" class="sym">2</text>
    <text x="448" y="272" font-size="52" class="sym">×</text>

    <!-- Row 4 (sides + center) -->
    <text x="20"  y="378" font-size="52" class="sym">÷</text>
    <text x="170" y="370" font-size="38" class="sym">×</text>
    <text x="294" y="382" font-size="44" class="sym">−</text>
    <text x="452" y="368" font-size="40" class="sym">4</text>

    <!-- Row 5 -->
    <text x="28"  y="462" font-size="40" class="sym">+</text>
    <text x="112" y="474" font-size="36" class="sym">10</text>
    <text x="204" y="458" font-size="52" class="sym">−</text>
    <text x="288" y="476" font-size="38" class="sym">¾</text>
    <text x="372" y="460" font-size="52" class="sym">+</text>
    <text x="454" y="474" font-size="38" class="sym">6</text>
  </g>

  <!-- Sprout from app, centered and large — scale(1.7) centers around (155,174) → (256,280) -->
  <g transform="translate(-8,-16) scale(1.7)" stroke-linecap="round" fill="none">
    <!-- grass blades -->
    <path d="M154 284 Q100 278 72 292" stroke="#16763a" stroke-width="3.0"/>
    <path d="M156 284 Q210 278 238 292" stroke="#16763a" stroke-width="3.0"/>
    <path d="M154 283 Q112 270 92 278" stroke="#1a8e44" stroke-width="3.2"/>
    <path d="M156 283 Q198 270 218 278" stroke="#1a8e44" stroke-width="3.2"/>
    <path d="M154 283 Q128 266 116 268" stroke="#1e9e4c" stroke-width="3.4"/>
    <path d="M156 283 Q182 266 194 268" stroke="#1e9e4c" stroke-width="3.4"/>
    <path d="M154 282 Q142 266 138 260" stroke="#20a650" stroke-width="3.5"/>
    <path d="M156 282 Q168 266 172 260" stroke="#20a650" stroke-width="3.5"/>
    <path d="M154 283 Q105 276 76 289" stroke="#50de80" stroke-width="1.5" opacity="0.55"/>
    <path d="M156 283 Q205 276 234 289" stroke="#50de80" stroke-width="1.5" opacity="0.55"/>
    <path d="M154 282 Q130 268 118 270" stroke="#50de80" stroke-width="1.4" opacity="0.50"/>
    <path d="M156 282 Q180 268 192 270" stroke="#50de80" stroke-width="1.4" opacity="0.50"/>
    <!-- stem -->
    <path d="M155 278 Q152 234 154 190 Q156 155 155 118" stroke="url(#hi-ls)" stroke-width="5.5"/>
    <!-- left leaf -->
    <path d="M154 194 C136 174,82 152,62 108 C50 78,74 50,104 70 C126 85,144 146,154 194Z" fill="url(#hi-l1)" stroke="none"/>
    <ellipse cx="96" cy="110" rx="22" ry="12" fill="rgba(255,255,255,0.26)" transform="rotate(-35 96 110)" stroke="none"/>
    <path d="M153 189 C130 166 88 128 68 100" stroke="rgba(255,255,255,0.42)" stroke-width="2.5"/>
    <!-- right leaf -->
    <path d="M156 162 C176 142,228 120,248 76 C260 46,236 18,206 38 C184 54,164 112,156 162Z" fill="url(#hi-l2)" stroke="none"/>
    <ellipse cx="212" cy="80" rx="21" ry="11" fill="rgba(255,255,255,0.24)" transform="rotate(34 212 80)" stroke="none"/>
    <path d="M157 158 C178 134 210 94 228 68" stroke="rgba(255,255,255,0.38)" stroke-width="2.5"/>
    <!-- top bud -->
    <path d="M155 118 C147 100 145 74 155 56 C165 74 163 100 155 118Z" fill="url(#hi-lb)" stroke="none"/>
  </g>

  <!-- Glass rim highlight (top-left bright edge) -->
  <rect width="512" height="512" rx="112" ry="112"
        fill="none"
        stroke="url(#rimGrad)" stroke-width="3"/>
  <!-- Top highlight sheen -->
  <ellipse cx="220" cy="60" rx="130" ry="28"
           fill="rgba(255,255,255,0.45)"/>
</svg>
</body>
</html>
