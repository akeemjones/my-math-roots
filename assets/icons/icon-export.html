<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1024px; height: 1024px; overflow: hidden; background: #e8eaed; }

.icon {
  width: 1024px; height: 1024px;
  border-radius: 230px;
  position: relative; overflow: hidden; isolation: isolate;
}

.bg {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at 36% 28%,
    #7ecbee 0%, #96d4f0 16%, #aedaf2 32%,
    #bfe0f5 48%, #c8dff5 62%, #cddaf4 76%, #d2d8f2 100%);
}
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 60% 100%, rgba(65,208,142,0.48) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 46%, rgba(255,255,255,0.18) 0%, transparent 46%);
}

.glass {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(148deg,
    rgba(255,255,255,0.30) 0%,
    rgba(232,246,255,0.13) 38%,
    rgba(202,242,220,0.10) 72%,
    rgba(193,238,216,0.08) 100%);
  backdrop-filter: blur(8px) saturate(138%) brightness(1.04);
  -webkit-backdrop-filter: blur(8px) saturate(138%) brightness(1.04);
}

.gy { position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  width:760px; height:600px; z-index:3; pointer-events:none;
  background:radial-gradient(ellipse,rgba(255,255,255,0.22) 0%,rgba(255,255,255,0.08) 40%,transparent 65%);}
.gg { position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  width:700px; height:610px; z-index:3; pointer-events:none;
  background:radial-gradient(ellipse,rgba(42,212,102,0.03) 0%,transparent 50%);}

.shapes { position:absolute; inset:0; z-index:4; pointer-events:none; }
.sh { position:absolute; }

.sq { border-radius:24px; border:4px solid rgba(255,255,255,0.78); }
.ci { border-radius:50%; border:4px solid rgba(255,255,255,0.78);
  display:flex; align-items:center; justify-content:center;
  font-family:'Boogaloo','Arial Rounded MT Bold',sans-serif; line-height:1; }

.c-red    { background:linear-gradient(135deg,rgba(231,76,60,0.72),rgba(192,57,43,0.58));   box-shadow:0 8px 28px rgba(192,57,43,0.25),inset 0 3px 0 rgba(255,255,255,0.75);  color:#6b1010; }
.c-yellow { background:linear-gradient(135deg,rgba(241,196,15,0.78),rgba(212,172,13,0.62)); box-shadow:0 8px 28px rgba(180,140,0,0.25),inset 0 3px 0 rgba(255,255,255,0.75);  color:#6b4e00; }

.c-green  { background:linear-gradient(135deg,rgba(39,174,96,0.78),rgba(30,140,76,0.62));   box-shadow:0 8px 28px rgba(30,140,76,0.25),inset 0 3px 0 rgba(255,255,255,0.75);  color:#0b4020; }
.c-purple { background:linear-gradient(135deg,rgba(142,68,173,0.75),rgba(113,54,138,0.60)); box-shadow:0 8px 28px rgba(113,54,138,0.25),inset 0 3px 0 rgba(255,255,255,0.75); color:#3a0b5c; }
.c-orange { background:linear-gradient(135deg,rgba(230,126,34,0.78),rgba(194,102,26,0.62)); box-shadow:0 8px 28px rgba(194,102,26,0.25),inset 0 3px 0 rgba(255,255,255,0.75); color:#6b2e00; }
.c-teal   { background:linear-gradient(135deg,rgba(26,188,156,0.78),rgba(18,150,124,0.62)); box-shadow:0 8px 28px rgba(18,150,124,0.25),inset 0 3px 0 rgba(255,255,255,0.75); color:#063e33; }
.st { color:#f5c010; line-height:1;
