<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Math Roots — Icon Preview</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #cdd1da;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(200,220,255,0.30) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(160,235,200,0.24) 0%, transparent 50%);
}

.icon {
  width: 512px;
  height: 512px;
  border-radius: 115px;
  position: relative;
  overflow: hidden;
  isolation: isolate;
  box-shadow:
    0 72px 140px rgba(50,100,175,0.48),
    0 30px 60px  rgba(0,0,0,0.22),
    0 6px  16px  rgba(0,0,0,0.14);
}

/* BG */
.bg {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at 36% 28%,
    #7ecbee 0%, #96d4f0 16%, #aedaf2 32%,
    #bfe0f5 48%, #c8dff5 62%, #cddaf4 76%, #d2d8f2 100%);
}
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 60% 100%, rgba(65,208,142,0.48) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 46%, rgba(255,255,255,0.18) 0%, transparent 46%);
}

/* Glass */
.glass {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(148deg,
    rgba(255,255,255,0.30) 0%,
    rgba(232,246,255,0.13) 38%,
    rgba(202,242,220,0.10) 72%,
    rgba(193,238,216,0.08) 100%);
  backdrop-filter: blur(4px) saturate(138%) brightness(1.04);
  -webkit-backdrop-filter: blur(4px) saturate(138%) brightness(1.04);
}

/* Glows */
.gy { position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  width:380px; height:300px; z-index:3; pointer-events:none;
  background:radial-gradient(ellipse,rgba(255,255,255,0.22) 0%,rgba(255,255,255,0.08) 40%,transparent 65%);}
.gg { position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  width:350px; height:305px; z-index:3; pointer-events:none;
  background:radial-gradient(ellipse,rgba(42,212,102,0.03) 0%,transparent 50%);}

/* Shapes layer */
.shapes { position:absolute; inset:0; z-index:4; pointer-events:none; }
.sh { position:absolute; }

/* Base styles — color overridden per shape */
.sq {
  border-radius:12px;
  border:2px solid rgba(255,255,255,0.78);
}
.ci {
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.78);
  display:flex;align-items:center;justify-content:center;
  font-family:'Boogaloo','Arial Rounded MT Bold',sans-serif;
  line-height:1;
}

/* App palette helpers — pastel tinted */
.c-red    { background:linear-gradient(135deg,rgba(231,76,60,0.72),rgba(192,57,43,0.58));   box-shadow:0 4px 14px rgba(192,57,43,0.25),inset 0 1.5px 0 rgba(255,255,255,0.75);  color:#6b1010; }
.c-yellow { background:linear-gradient(135deg,rgba(241,196,15,0.78),rgba(212,172,13,0.62)); box-shadow:0 4px 14px rgba(180,140,0,0.25),inset 0 1.5px 0 rgba(255,255,255,0.75);  color:#6b4e00; }
.c-blue   { background:linear-gradient(135deg,rgba(74,144,217,0.78),rgba(52,110,180,0.62)); box-shadow:0 4px 14px rgba(52,110,180,0.25),inset 0 1.5px 0 rgba(255,255,255,0.75); color:#0b2e5c; }
.c-green  { background:linear-gradient(135deg,rgba(39,174,96,0.78),rgba(30,140,76,0.62));   box-shadow:0 4px 14px rgba(30,140,76,0.25),inset 0 1.5px 0 rgba(255,255,255,0.75);  color:#0b4020; }
.c-purple { background:linear-gradient(135deg,rgba(142,68,173,0.75),rgba(113,54,138,0.60)); box-shadow:0 4px 14px rgba(113,54,138,0.25),inset 0 1.5px 0 rgba(255,255,255,0.75); color:#3a0b5c; }
.c-orange { background:linear-gradient(135deg,rgba(230,126,34,0.78),rgba(194,102,26,0.62)); box-shadow:0 4px 14px rgba(194,102,26,0.25),inset 0 1.5px 0 rgba(255,255,255,0.75); color:#6b2e00; }
.c-teal   { background:linear-gradient(135deg,rgba(26,188,156,0.78),rgba(18,150,124,0.62)); box-shadow:0 4px 14px rgba(18,150,124,0.25),inset 0 1.5px 0 rgba(255,255,255,0.75); color:#063e33; }
.st {
  color:#f5c010; line-height:1;
  text-shadow:0 0 10px rgba(255,196,0,0.95),0 0 24px rgba(255,180,0,0.55),0 2px 4px rgba(140,95,0,0.28);
}

/* Sprout — bigger now that text is removed */
.sprout {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-52%);
  z-index:5;
  filter: drop-shadow(0 14px 20px rgba(0,50,15,0.18));
}

/* Glass rim & reflections — topmost */
.rim {
  position:absolute; inset:0; z-index:9; border-radius:115px;
  border-top:2.5px solid rgba(255,255,255,0.90);
  border-left:2.5px solid rgba(255,255,255,0.74);
  border-right:2px solid rgba(255,255,255,0.22);
  border-bottom:2px solid rgba(255,255,255,0.16);
  pointer-events:none;
}
.rim-i {
  position:absolute; inset:0; z-index:9;
  box-shadow:inset 0 3px 0 rgba(255,255,255,0.95),inset 0 -3px 10px rgba(55,115,175,0.10);
  pointer-events:none;
}
.caus {
  position:absolute; top:-28px; left:-44px;
  width:300px; height:155px;
  background:radial-gradient(ellipse,rgba(255,255,255,0.75) 0%,transparent 65%);
  border-radius:50%; z-index:10; transform:rotate(-11deg); pointer-events:none;
}
.flare {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  width:350px; height:56px;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.60) 0%,transparent 70%);
  border-radius:50%; z-index:10; pointer-events:none;
}
.dep {
  position:absolute; bottom:0; right:0;
  width:305px; height:225px;
  background:radial-gradient(ellipse at bottom right,rgba(44,84,168,0.18) 0%,transparent 56%);

}

.lbl {
  font-family:'Boogaloo',sans-serif; font-size:13px;
  color:rgba(80,90,105,0.46); letter-spacing:3px; text-transform:uppercase;
}
</style>
