name: CI / Deploy

on:
  push:
    branches: [staging]
  pull_request:
    branches: [master]

jobs:
  # ───────────────────────────────────────────────────────────────
  # Job 1: Tests — runs on every push and every PR
  # ───────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install root dependencies
        run: npm ci

      - name: Run Jest (legacy vanilla app)
        run: npm test

      - name: Install SvelteKit dependencies
        run: npm ci
        working-directory: app

      - name: Run Vitest (SvelteKit app)
        run: npx vitest run --reporter=verbose
        working-directory: app

  # ───────────────────────────────────────────────────────────────
  # Job 2: Deploy to Staging — staging branch push OR PRs
  # Production is deployed manually via Netlify UI (never auto-deployed)
  # ───────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install SvelteKit dependencies
        run: npm ci
        working-directory: app

      - name: Build SvelteKit app
        run: npm run build
        working-directory: app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy PR preview to Netlify Staging
        run: npx netlify-cli deploy --prod --dir=app/build --site=${{ secrets.NETLIFY_SITE_ID_STAGING }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
