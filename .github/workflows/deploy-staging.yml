name: CI / Deploy

on:
  push:
    branches: [staging]
  pull_request:
    branches: [master]

jobs:
  # ───────────────────────────────────────────────────────────────
  # Tests + build + audit for the vanilla V1 app.
  #
  # V2 SvelteKit was moved to a separate repo (mymathroots-v2-sveltekit)
  # earlier in the project. The previous "Install SvelteKit dependencies",
  # "Run Vitest (SvelteKit app)", and the entire "Deploy to Staging" job
  # referenced an `app/` directory that no longer exists in this repo —
  # they were removed 2026-05-23.
  #
  # V1 production is deployed manually via `netlify deploy --prod` from
  # a locally-verified build artifact — never auto-deployed.
  # ───────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest test suite
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev
